<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>TLOED Dashboard</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TLOED">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#111827">

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" sizes="192x192" href="/android-chrome-192x192.png">
    <link rel="icon" sizes="512x512" href="/android-chrome-512x512.png">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="shortcut icon" href="/favicon.ico" />

    <style>
        /* ── Base ────────────────────────────────────────────────── */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        body {
            margin: 0;
            background-color: #111827; /* gray-900 — eliminates flash before React mounts */
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            overscroll-behavior-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        /* ── iOS Safe Areas ──────────────────────────────────────── */
        @supports (padding: max(0px)) {
            .safe-area-top    { padding-top:    max(1rem, env(safe-area-inset-top));    }
            .safe-area-bottom { padding-bottom: max(1rem, env(safe-area-inset-bottom)); }
            .safe-area-left   { padding-left:   max(1rem, env(safe-area-inset-left));   }
            .safe-area-right  { padding-right:  max(1rem, env(safe-area-inset-right));  }
        }

        /* ── Touch targets ───────────────────────────────────────── */
        button, a, [role="button"] {
            min-height: 44px;
            min-width: 44px;
        }

        /* ── Focus ring ──────────────────────────────────────────── */
        *:focus-visible {
            outline: 2px solid #3b82f6; /* blue-500 */
            outline-offset: 2px;
            border-radius: 6px;
        }

        /* ── Inputs — prevent iOS zoom ───────────────────────────── */
        input, select, textarea {
            font-size: 16px !important;
        }

        /* ── Scrolling helpers ───────────────────────────────────── */
        .mobile-scroll {
            -webkit-overflow-scrolling: touch;
            overflow-y: auto;
        }

        @media (max-width: 768px) {
            .hide-scrollbar                    { scrollbar-width: none; -ms-overflow-style: none; }
            .hide-scrollbar::-webkit-scrollbar { display: none; }
        }

        /* ── Cards ───────────────────────────────────────────────── */
        .mobile-card {
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(2, 6, 23, 0.08), 0 1px 2px rgba(2, 6, 23, 0.04);
            border: 1px solid rgba(2, 6, 23, 0.04);
            background-clip: padding-box;
            transform: translateZ(0);
        }

        /* ── Loading spinner (shown before React mounts) ─────────── */
        #root:empty::after {
            content: '';
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111827;
        }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
</body>
</html>
